# Сервер
server.port=8080
server.servlet.context-path=/

# База данных PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost/laba3
spring.datasource.username=bober
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA (Hibernate) настройки
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Логирование
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Покажите создание таблиц в логах
logging.level.org.hibernate.tool.hbm2ddl=DEBUG

# Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Статические файлы (аналог UseStaticFiles)
spring.web.resources.static-locations=classpath:/wwwroot/
spring.mvc.static-path-pattern=/**
